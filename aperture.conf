# Aperture Configuration for AgentRoute Oracle
# L402 Reverse Proxy Configuration

[Application Options]
# Server listening address
listen=0.0.0.0:8081

# Backend service to protect
backend=http://localhost:8000

# TLS configuration
tlscertpath=~/.lnd/tls.cert
tlskeypath=~/.lnd/tls.key

# Logging
debuglevel=info
logdir=./logs

[LND]
# LND connection settings
lndhost=localhost
lndport=10009

# Macaroon path for authentication
macaroonpath=~/.lnd/data/chain/bitcoin/mainnet/admin.macaroon

# TLS certificate path
tlscertpath=~/.lnd/tls.cert

[L402]
# Enable L402 payment protocol
enabled=true

# Service name for invoices
servicename=AgentRoute Oracle

# Default pricing (in satoshis)
defaultprice=15

# Maximum price per request
maxprice=30

# Minimum price per request
minprice=5

# Dynamic pricing based on complexity
dynamicpricing=true

# Price factors
[Pricing]
# Base price for simple queries
baseprice=10

# Additional cost per hop in route
costperhop=2

# Congestion multiplier (1.0 = normal, 2.0 = double during high load)
congestionmultiplier=1.0

# Time-based pricing (higher during peak hours)
peakhourfactor=1.5

[Routing]
# Route caching (in seconds)
cacheduration=300

# Maximum routes to return
maxroutes=5

# Timeout for route finding (in milliseconds)
routetimeout=5000

[Monitoring]
# Prometheus metrics endpoint
metricsport=9090

# Enable request logging
requestlogging=true

# Log file path
logpath=./logs/aperture.log

[Security]
# Rate limiting (requests per second per IP)
ratelimit=100

# Maximum request body size (in bytes)
maxbodysize=10485760

# CORS allowed origins
corsorigins=*

# API key authentication (optional, for admin endpoints)
apikeyenabled=false
